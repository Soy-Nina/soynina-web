collections:
  - name: "blog-es"
    label: "Blog (Español)"
    label_singular: "Artículo"
    folder: "content/blog/es"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Extracto", name: "excerpt", widget: "text" }
      - { label: "Fecha", name: "date", widget: "string", hint: "Ej: 4 de enero, 2026" }
      - { label: "Autor/a", name: "author", widget: "string" }
      - { label: "Categoría", name: "category", widget: "string" }
      - { label: "Gradiente (CSS)", name: "gradient", widget: "string", default: "from-[#4526c9] to-[#fe35fe]", hint: "Clases de Tailwind para el color de portada. Ej: from-[#4526c9] to-[#fe35fe]" }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "blog-en"
    label: "Blog (English)"
    label_singular: "Post"
    folder: "content/blog/en"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Date", name: "date", widget: "string", hint: "E.g. January 4, 2026" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Gradient (CSS)", name: "gradient", widget: "string", default: "from-[#4526c9] to-[#fe35fe]", hint: "Tailwind gradient classes for the cover. E.g. from-[#4526c9] to-[#fe35fe]" }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "reports"
    label: "Informes Mensuales"
    label_singular: "Informe"
    folder: "content/reports"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string", hint: "Ej: Informe Marzo 2026" }
      - { label: "Mes", name: "month", widget: "number", value_type: "int", min: 1, max: 12, hint: "Número del mes (1 = Enero, 12 = Diciembre)" }
      - { label: "Año", name: "year", widget: "number", value_type: "int", min: 2020, max: 2099 }
      - { label: "Descripción", name: "description", widget: "text", hint: "Breve resumen del contenido del informe" }
      - { label: "Archivo PDF", name: "pdf", widget: "file", media_folder: "/public/reports", public_folder: "/reports", hint: "Sube el archivo PDF del informe" }

  - name: "translations"
    label: "Textos del Sitio"
    format: json
    files:
      - name: "es"
        label: "Español (es.json)"
        file: "messages/es.json"
        fields: *translation-fields
      - name: "en"
        label: "English (en.json)"
        file: "messages/en.json"
        fields: *translation-fields
