backend:
  name: github
  repo: Soy-Nina/soynina-web
  branch: feat/editable-metrics

publish_mode: editorial_workflow

media_folder: "public/reports"
public_folder: "/reports"

locale: "es"

# YAML anchor — defined once, reused for both es and en file entries
x-translation-fields: &translation-fields

  - label: "Metadata"
    name: "Metadata"
    widget: "object"
    fields:
      - { label: "Título / Title", name: "title", widget: "string" }
      - { label: "Descripción / Description", name: "description", widget: "text" }

  - label: "Navigation"
    name: "Navigation"
    widget: "object"
    fields:
      - { label: "¿Quiénes Somos?", name: "quienesSomos", widget: "string" }
      - { label: "Programas", name: "programas", widget: "string" }
      - { label: "Voluntariado", name: "voluntariado", widget: "string" }
      - { label: "Blog", name: "blog", widget: "string" }
      - { label: "Eventos", name: "eventos", widget: "string" }
      - { label: "Informes", name: "informes", widget: "string" }
      - { label: "Contacto", name: "contacto", widget: "string" }
      - { label: "Donar Ahora", name: "donarAhora", widget: "string" }
