      - { label: "CTA Voluntaria", name: "ctaVolunteer", widget: "string" }
      - { label: "Alt imagen", name: "imageAlt", widget: "string" }
      - label: "Stats"
        name: "stats"
        widget: "object"
        fields:
          - label: "Vidas impactadas"
            name: "livesImpacted"
            widget: "object"
            fields:
              - { label: "Valor", name: "value", widget: "string" }
              - { label: "Etiqueta", name: "label", widget: "string" }
          - label: "Niñas activas"
            name: "activeGirls"
            widget: "object"
            fields:
              - { label: "Valor", name: "value", widget: "string" }
              - { label: "Etiqueta", name: "label", widget: "string" }
