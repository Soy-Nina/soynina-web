<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Soy Niña — Admin</title>
  <style>
    #cms-action-group {
      position: fixed;
      top: 0;
      right: 9999px; /* JS will set this once Decap renders */
      height: 51px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 99999;
      pointer-events: none;
    }

    .cms-nav-btn {
      pointer-events: all;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 13px;
      border-radius: 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      transition: opacity 0.15s, background 0.15s;
      line-height: 1;
    }

    .cms-nav-btn--ghost {
      color: rgba(255, 255, 255, 0.75);
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .cms-nav-btn--ghost:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(255, 255, 255, 0.40);
    }

    .cms-nav-btn--primary {
      color: #fff;
      background: linear-gradient(135deg, #4526c9, #fe35fe);
      border: 1px solid transparent;
      box-shadow: 0 2px 8px rgba(69, 38, 201, 0.40);
    }

    .cms-nav-btn--primary:hover { opacity: 0.88; }

    .cms-nav-btn svg {
      width: 13px;
      height: 13px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="cms-action-group">
    <a id="cms-staging-link" class="cms-nav-btn cms-nav-btn--ghost" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Ver staging
    </a>
    <a class="cms-nav-btn cms-nav-btn--primary" href="/admin/deploy.html">
      <svg viewBox="0 0 24 24"><path d="M5 12l7-7 7 7M12 5v14"/></svg>
      Publicar sitio
    </a>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    const STAGING_URL = 'https://staging--cute-snickerdoodle-bbb672.netlify.app';
    document.getElementById('cms-staging-link').href = STAGING_URL;

    function positionGroup() {
      const group = document.getElementById('cms-action-group');
      const nav = document.querySelector('nav');
      if (!group || !nav) return;

      // Find all interactive nav elements that aren't ours
      const candidates = [...nav.querySelectorAll('button, a, [role="button"]')]
        .filter(el => !group.contains(el));

      if (!candidates.length) return;

      // Among elements in the right half of the screen, find the leftmost one
      const mid = window.innerWidth / 2;
      const rightSide = candidates
        .map(el => el.getBoundingClientRect())
        .filter(r => r.width > 10 && r.left > mid);

      if (!rightSide.length) return;

      const leftEdge = Math.min(...rightSide.map(r => r.left));
      group.style.right = (window.innerWidth - leftEdge + 12) + 'px';
    }

    // Run whenever Decap mutates the DOM, then stop trying once positioned
    const observer = new MutationObserver(() => {
      positionGroup();
      // Keep re-running in case Decap re-renders the nav
    });
    observer.observe(document.body, { childList: true, subtree: true });
    window.addEventListener('resize', positionGroup);
  </script>
</body>
</html>
