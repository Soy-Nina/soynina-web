<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Soy Niña — Admin</title>
  <style>
    #deploy-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 99999;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 999px;
      background: linear-gradient(135deg, #4526c9, #fe35fe);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(69, 38, 201, 0.40);
      transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    #deploy-fab:hover {
      opacity: 0.92;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(69, 38, 201, 0.50);
    }
    #deploy-fab:active {
      transform: translateY(0);
    }
    #deploy-fab svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <a id="deploy-fab" href="/admin/deploy.html" title="Publicar todos los cambios al sitio en vivo">
    <svg viewBox="0 0 24 24"><path d="M5 12l7-7 7 7M12 5v14"/></svg>
    Publicar Sitio
  </a>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
